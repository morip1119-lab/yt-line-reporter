name: Daily YouTube Report

on:
  schedule:
    # UTC 03:00 = JST 12:00
    - cron: '0 3 * * *'
  workflow_dispatch:
    # GitHub の画面から手動実行も可能

jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. リポジトリをチェックアウト（DB ファイルも含む） ──────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python セットアップ ──────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      # ── 3. 依存パッケージインストール ───────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Playwright + Chromium インストール ────────────────────────────
      - name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps

      # ── 5. レポート生成 & LINE 送信 ──────────────────────────────────────
      - name: Run report
        env:
          YOUTUBE_API_KEY:            ${{ secrets.YOUTUBE_API_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN:  ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          CHANNEL_1_YT_HANDLE:        ${{ secrets.CHANNEL_1_YT_HANDLE }}
          CHANNEL_1_LINE_GROUP_IDS:   ${{ secrets.CHANNEL_1_LINE_GROUP_IDS }}
          CHANNEL_2_YT_HANDLE:        ${{ secrets.CHANNEL_2_YT_HANDLE }}
          CHANNEL_2_LINE_GROUP_IDS:   ${{ secrets.CHANNEL_2_LINE_GROUP_IDS }}
          # 旧形式 1 チャンネル用（CHANNEL_1_* 未使用のとき .env 互換のフォールバック）
          YOUTUBE_CHANNEL_HANDLE:     ${{ secrets.YOUTUBE_CHANNEL_HANDLE }}
          LINE_GROUP_ID:              ${{ secrets.LINE_GROUP_ID }}
          # チャンネルが増えたら CHANNEL_3_* を workflow にも追加
        run: python run_scheduled.py

      # ── 6. 更新された DB をリポジトリにコミット ─────────────────────────
      - name: Commit updated DB
        continue-on-error: true
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stats.db
          git diff --staged --quiet || git commit -m "chore: update stats.db [skip ci]"
          git push || echo "push skipped (nothing to push or permission issue)"
